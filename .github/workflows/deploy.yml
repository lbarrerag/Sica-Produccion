name: SICA — Build y Deploy a Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Caché de dependencias
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente Prisma
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build de Next.js
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Preparar artefacto standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

          # Completar paquetes que Next.js standalone deja incompletos (solo package.json).
          # pnpm strict hoisting: los paquetes transitivos solo están en .pnpm/ virtual store.
          for pkg_rel in "@next/env" "@swc/helpers" "client-only" "detect-libc" "sharp" \
            "@prisma/client-runtime-utils" "pg-cloudflare" "pg-connection-string" "pg-int8" \
            "pg-pool" "pg-protocol" "pg-types" "pgpass" "postgres-array" "postgres-bytea" \
            "postgres-date" "postgres-interval" "split2" "xtend"; do
            target=".next/standalone/node_modules/$pkg_rel"
            pkg_name=$(basename "$pkg_rel")
            scope=$(dirname "$pkg_rel")
            if [ "$scope" = "." ]; then
              pattern="*/$pkg_name"
            else
              pattern="*/$scope/$pkg_name"
            fi
            src=$(find node_modules/.pnpm -maxdepth 6 -type d -path "$pattern" 2>/dev/null \
              | grep -v "/node_modules/$pkg_rel/node_modules" | head -1)
            if [ -z "$src" ] && [ -d "node_modules/$pkg_rel" ]; then
              src="node_modules/$pkg_rel"
            fi
            if [ -n "$src" ]; then
              mkdir -p "$target"
              # rsync --exclude=node_modules evita copiar dependencias anidadas del pnpm store
              rsync -a --exclude='node_modules/' "$src/" "$target/"
              echo "Completed: $pkg_rel"
            else
              echo "WARNING: Not found: $pkg_rel"
            fi
          done

          # Prisma generated client → node_modules/.prisma/client/
          # La nueva app despliega node_modules/ directamente (sin tar.gz),
          # así que .prisma/ oculto llega sin problema vía zip extract.
          PRISMA_GENERATED=$(find node_modules/.pnpm -path "*/@prisma+client*/.prisma/client" \
            -type d 2>/dev/null | head -1)
          if [ -n "$PRISMA_GENERATED" ]; then
            mkdir -p .next/standalone/node_modules/.prisma/client
            rsync -a "$PRISMA_GENERATED/" .next/standalone/node_modules/.prisma/client/
            echo "Prisma client copiado a node_modules/.prisma/client/"
          else
            echo "WARNING: Prisma generated client not found"
          fi

          # Turbopack hash modules: .next/node_modules/ tiene SYMLINKS al pnpm store.
          # Los copiamos a node_modules/ usando rsync --exclude=node_modules para evitar
          # recursión en dependencias anidadas del pnpm virtual store.
          if [ -d ".next/standalone/.next/node_modules" ]; then
            echo "Copiando Turbopack hash modules a node_modules/..."

            # Módulos sin scope (bcryptjs-xxx, pg-xxx, rimraf-xxx, etc.)
            for hash_link in .next/standalone/.next/node_modules/*/; do
              [ -e "$hash_link" ] || continue
              mod_name=$(basename "$hash_link")
              real_path=$(readlink -f "$hash_link" 2>/dev/null)
              if [ -n "$real_path" ] && [ -d "$real_path" ]; then
                mkdir -p ".next/standalone/node_modules/$mod_name"
                rsync -a --exclude='node_modules/' "$real_path/" ".next/standalone/node_modules/$mod_name/"
                echo "  $mod_name"
              fi
            done

            # Módulos con scope (@prisma/client-xxx, etc.)
            for scope_dir in .next/standalone/.next/node_modules/@*/; do
              [ -d "$scope_dir" ] || continue
              scope_name=$(basename "$scope_dir")
              for hash_link in "$scope_dir"*/; do
                [ -e "$hash_link" ] || continue
                mod_name=$(basename "$hash_link")
                real_path=$(readlink -f "$hash_link" 2>/dev/null)
                if [ -n "$real_path" ] && [ -d "$real_path" ]; then
                  mkdir -p ".next/standalone/node_modules/@$scope_name/$mod_name"
                  rsync -a --exclude='node_modules/' "$real_path/" \
                    ".next/standalone/node_modules/@$scope_name/$mod_name/"
                  echo "  @$scope_name/$mod_name"
                fi
              done
            done
          fi

          # Evitar que Oryx intente hacer build propio durante el startup
          echo -n "" > .next/standalone/oryx-manifest.toml

      - name: Comprimir artefacto para deploy
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sica-build
          path: deploy.zip
          retention-days: 1

  migrate:
    name: Migrar base de datos
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar migraciones
        run: pnpm db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generar cliente Prisma
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed usuario administrador
        run: pnpm seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy a Azure App Service
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: sica-build

      - name: Deploy via Kudu ZIP Deploy
        env:
          DEPLOY_USER: ${{ secrets.AZURE_DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.AZURE_DEPLOY_PASS }}
          WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          # Las credenciales se pasan como env vars para que bash no interprete el '$' del username
          curl -X POST \
            --fail \
            --silent \
            --show-error \
            -u "$DEPLOY_USER:$DEPLOY_PASS" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://$WEBAPP_NAME.scm.azurewebsites.net/api/zipdeploy?isAsync=true&author=GitHub+Actions"
