name: SICA — Build y Deploy a Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Caché de dependencias
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente Prisma
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build de Next.js
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Preparar artefacto standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Completar paquetes que Next.js standalone deja incompletos (solo package.json)
          # Busca en pnpm virtual store ya que strict hoisting no crea symlinks en raíz
          for pkg_rel in "@next/env" "@swc/helpers" "client-only" "detect-libc" "sharp"; do
            target=".next/standalone/node_modules/$pkg_rel"
            pkg_name=$(basename "$pkg_rel")
            scope=$(dirname "$pkg_rel")
            if [ "$scope" = "." ]; then
              pattern="*/$pkg_name"
            else
              pattern="*/$scope/$pkg_name"
            fi
            src=$(find node_modules/.pnpm -maxdepth 6 -type d -path "$pattern" 2>/dev/null | grep -v "/node_modules/$pkg_rel/node_modules" | head -1)
            if [ -z "$src" ] && [ -d "node_modules/$pkg_rel" ]; then
              src="node_modules/$pkg_rel"
            fi
            if [ -n "$src" ]; then
              mkdir -p "$target"
              cp -r "$src/." "$target/"
              echo "Completed: $pkg_rel from $src"
            else
              echo "WARNING: Not found: $pkg_rel"
            fi
          done
          # Copiar cliente Prisma generado para que require('.prisma/client/default') funcione.
          # El cliente generado va en .pnpm como hermano de @prisma/client.
          # Turbopack crea una copia en .next/node_modules/@prisma/client-<hash>/ que también lo necesita.
          PRISMA_GENERATED=$(find node_modules/.pnpm -path "*/@prisma+client*/.prisma/client" -type d 2>/dev/null | head -1)
          if [ -n "$PRISMA_GENERATED" ]; then
            echo "Prisma generated client found: $PRISMA_GENERATED"
            # 1. Dentro de node_modules/@prisma/client/ (para require normal)
            mkdir -p .next/standalone/node_modules/@prisma/client/.prisma/client
            cp -r "$PRISMA_GENERATED/." .next/standalone/node_modules/@prisma/client/.prisma/client/
            # 2. Dentro de cada .next/node_modules/@prisma/client-*/ (para Turbopack externalRequire)
            for turbo_dir in .next/node_modules/@prisma/client-*/; do
              if [ -d "$turbo_dir" ]; then
                mkdir -p "$turbo_dir/.prisma/client"
                cp -r "$PRISMA_GENERATED/." "$turbo_dir/.prisma/client/"
                echo "Copied to Turbopack dir: $turbo_dir"
              fi
            done
          else
            echo "WARNING: Prisma generated client not found"
          fi
          # Evita que el runtime de Oryx sobreescriba node_modules al arrancar
          echo -n "" > .next/standalone/oryx-manifest.toml

      - name: Comprimir artefacto para deploy
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sica-build
          path: deploy.zip
          retention-days: 1

  migrate:
    name: Migrar base de datos
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar migraciones
        run: pnpm db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy a Azure App Service
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: sica-build

      - name: Deploy via Kudu ZIP Deploy
        run: |
          curl -X POST \
            --fail \
            --silent \
            --show-error \
            -u "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASS }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=true&author=GitHub+Actions"
