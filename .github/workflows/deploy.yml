name: SICA — Build y Deploy a Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Obtener directorio de caché de pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Caché de dependencias
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente Prisma
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build de Next.js
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

      - name: Preparar artefacto standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # @swc/helpers no se incluye completo en el standalone de Next.js
          cp -r node_modules/@swc/helpers/. .next/standalone/node_modules/@swc/helpers/
          # Evita que el runtime de Oryx sobreescriba node_modules al arrancar
          echo -n "" > .next/standalone/oryx-manifest.toml

      - name: Comprimir artefacto para deploy
        run: |
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: sica-build
          path: deploy.zip
          retention-days: 1

  migrate:
    name: Migrar base de datos
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Ejecutar migraciones
        run: pnpm db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy a Azure App Service
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: sica-build

      - name: Deploy via Kudu ZIP Deploy
        run: |
          curl -X POST \
            --fail \
            --silent \
            --show-error \
            -u "${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASS }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=true&author=GitHub+Actions"
